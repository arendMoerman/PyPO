name: Run docs and tests

on:
  push:
    paths:
      - Dockerfile
      - .github/workflows/build-image.yml
    branches:
      - 'main'

permissions:
  contents: read
  packages: write

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # uncomment this in case running into storage limitation
      # Thanks to
      # <https://carlosbecker.com/posts/github-actions-disk-space/>
      # for this hack!
      #
      # ################# SNIP #################
      #
      #- run: df -h

      #- name: Free up disk space
      #  run: |
      #    sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
      #    sudo docker image prune --all --force
      #    sudo docker builder prune -a

      #- run: df -h
      #
      #
      #
      # ################# /SNIP #################
      #
      #
      #
      #

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: set up docker build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: "Dockerfile.cicd"
          tags: pypo-cicd:latest
          load: true
          push: false
          # This caches docker layers to github actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Docs
        uses: addnab/docker-run-action@v3
        with:
          image: pypo-cicd:latest
          run: ./GenerateDocs.py


